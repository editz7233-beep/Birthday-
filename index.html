<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For Deesha 🎂</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:Segoe UI;
  text-align:center;
  overflow:hidden;
}

.screen{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:90%;
  opacity:0;
  transition:1s;
}
.show{opacity:1;}

h1{color:#ff66aa;}
button{
  padding:12px 20px;
  border:none;
  border-radius:20px;
  background:#ff66aa;
  color:white;
  margin-top:20px;
  font-size:16px;
}

/* cake glow */
#cake{
  font-size:90px;
  text-shadow:0 0 20px orange, 0 0 40px red;
  animation: glow 1s infinite alternate;
}
@keyframes glow{
  from{ text-shadow:0 0 10px orange; }
  to{ text-shadow:0 0 40px red; }
}

/* floating */
@keyframes float{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}

.balloon,.butterfly{
  position:absolute;
  animation:float linear infinite;
}

.sparkle{
  position:absolute;
  width:4px;
  height:4px;
  background:white;
  animation:float 3s linear infinite;
}

/* confetti */
@keyframes fall{
  to{transform:translateY(100vh);}
}

/* name animation */
@keyframes fly{
  from{transform:translateY(-100px);opacity:0;}
  to{transform:translateY(0);opacity:1;}
}

/* slideshow */
.slide{
  width:230px;
  border-radius:10px;
  display:none;
}
.active{display:block;}

/* player */
#player{
  position:fixed;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  padding:10px 20px;
  border-radius:20px;
}
</style>
</head>

<body>

<!-- 1 MYSTERY -->
<div id="s1" class="screen show">
  <h1 id="typing"></h1>
</div>

<!-- 2 COUNTDOWN -->
<div id="s2" class="screen">
  <h1>Get Ready 🎉</h1>
  <h2 id="timer">5</h2>
</div>

<!-- 3 CAKE -->
<div id="s3" class="screen">
  <h1 id="nameAnim"></h1>
  <div id="cake">🎂</div>
  <button onclick="blow()">Blow Candles 🕯️</button>
</div>

<!-- 4 LIGHT -->
<div id="s4" class="screen">
  <h1>Lights ON ✨</h1>
  <button onclick="next()">Continue</button>
</div>

<!-- 5 MESSAGE -->
<div id="s5" class="screen">
  <div id="msg"></div>
  <button onclick="next2()">Next ❤️</button>
</div>

<!-- 6 MEMORIES -->
<div id="s6" class="screen">
  <h2>Memories 📸</h2>
  <img class="slide active" src="D1.jpg">
  <img class="slide" src="D2.jpg">
  <video class="slide" width="230" controls>
    <source src="video.mp4">
  </video>
</div>

<!-- music -->
<div id="player">
  <button onclick="toggleMusic()">▶️</button>
  <span>Now Playing 🎶</span>
</div>

<audio id="music" src="Deesha song.mp3"></audio>
<audio id="beat" src="heartbeat.mp3"></audio>

<script>
let music=document.getElementById("music");

/* typing intro */
let text="Hey Deesha...\nSomething special is waiting 💫";
let i=0;
function type(){
  if(i<text.length){
    typing.innerHTML+=text.charAt(i);
    i++;
    setTimeout(type,50);
  } else setTimeout(()=>switchS(s1,s2),1000);
}
type();

/* heartbeat */
beat.play();

/* countdown */
let t=5;
let cd=setInterval(()=>{
  t--;
  timer.innerText=t;
  if(t==0){
    clearInterval(cd);
    switchS(s2,s3);
    animateName();
  }
},1000);

/* name animation */
function animateName(){
  let name="DEESHA";
  name.split("").forEach((l,i)=>{
    let span=document.createElement("span");
    span.innerText=l;
    span.style.display="inline-block";
    span.style.animation=`fly 1s ease ${i*0.2}s forwards`;
    nameAnim.appendChild(span);
  });
}

/* blow candles */
function blow(){
  music.volume=0;
  music.play();
  fadeMusic();
  confetti();
  switchS(s3,s4);
}

/* fade music */
function fadeMusic(){
  let v=0;
  let f=setInterval(()=>{
    v+=0.05;
    music.volume=v;
    if(v>=1) clearInterval(f);
  },200);
}

/* next */
function next(){
  switchS(s4,s5);
  typeMsg();
  balloons();
}

/* message typing */
let msgText=`On this beautiful day... ❤️

May your smile shine brighter than candles,
and your heart stay as beautiful as ever ♡

Happy Birthday Deesha 🎉

(Also… you still owe me a treat 😄)`;
let j=0;

function typeMsg(){
  if(j<msgText.length){
    msg.innerHTML+=msgText.charAt(j);
    j++;
    setTimeout(typeMsg,40);
  }
}

/* next memories */
function next2(){
  switchS(s5,s6);
  butterflies();
  sparkles();
  slideshow();
}

/* switch */
function switchS(a,b){
  a.classList.remove("show");
  setTimeout(()=>b.classList.add("show"),500);
}

/* confetti */
function confetti(){
  for(let i=0;i<50;i++){
    let c=document.createElement("div");
    c.innerHTML="🎉";
    c.style.position="absolute";
    c.style.left=Math.random()*100+"%";
    c.style.top="-10px";
    c.style.animation="fall 3s linear";
    document.body.appendChild(c);
  }
}

/* balloons */
function balloons(){
  for(let i=0;i<10;i++){
    let b=document.createElement("div");
    b.innerHTML="🎈";
    b.className="balloon";
    b.style.left=Math.random()*100+"%";
    b.style.animationDuration=(4+Math.random()*3)+"s";
    document.body.appendChild(b);
  }
}

/* butterflies */
function butterflies(){
  for(let i=0;i<8;i++){
    let b=document.createElement("div");
    b.innerHTML="🦋";
    b.className="butterfly";
    b.style.left=Math.random()*100+"%";
    b.style.animationDuration=(5+Math.random()*3)+"s";
    document.body.appendChild(b);
  }
}

/* sparkles */
function sparkles(){
  for(let i=0;i<30;i++){
    let s=document.createElement("div");
    s.className="sparkle";
    s.style.left=Math.random()*100+"%";
    document.body.appendChild(s);
  }
}

/* slideshow */
let slides=document.querySelectorAll(".slide");
let k=0;
function slideshow(){
  setInterval(()=>{
    slides[k].classList.remove("active");
    k=(k+1)%slides.length;
    slides[k].classList.add("active");
  },3000);
}

/* player */
function toggleMusic(){
  if(music.paused) music.play();
  else music.pause();
}
</script>

</body>
</html>
